<div class="container mt-4">
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0">Write a New Post</h3>
    </div>
    <div class="card-body">
      <form [formGroup]="postForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="title" class="form-label">Title</label>
          <input type="text" id="title" class="form-control" formControlName="title" 
                 [ngClass]="{'is-invalid': postForm.get('title')?.invalid && postForm.get('title')?.touched, 
                             'is-valid': postForm.get('title')?.valid && postForm.get('title')?.touched}">
          <div class="invalid-feedback" *ngIf="postForm.get('title')?.errors?.['required']">Title is required.</div>
          <div class="invalid-feedback" *ngIf="postForm.get('title')?.errors?.['minlength']">Title must be at least 5 characters long.</div>
          <div class="invalid-feedback" *ngIf="postForm.get('title')?.errors?.['maxlength']">Title cannot exceed 150 characters.</div>
        </div>

        <div class="mb-3">
          <label for="categoryId" class="form-label">Category</label>
          <select id="categoryId" class="form-select" formControlName="categoryId"
                  [ngClass]="{'is-invalid': postForm.get('categoryId')?.invalid && postForm.get('categoryId')?.touched,
                              'is-valid': postForm.get('categoryId')?.valid && postForm.get('categoryId')?.touched}">
            <option value="" disabled>Select a category</option>
            <option *ngFor="let cat of categories" [value]="cat.id">{{cat.name}}</option>
          </select>
          <div class="invalid-feedback">A category must be selected.</div>
        </div>

        <div class="mb-3">
          <label for="content" class="form-label">Content</label>
          <textarea id="content" class="form-control" rows="5" formControlName="content" 
                    [ngClass]="{'is-invalid': postForm.get('content')?.invalid && postForm.get('content')?.touched,
                                'is-valid': postForm.get('content')?.valid && postForm.get('content')?.touched}"></textarea>
          <div class="invalid-feedback" *ngIf="postForm.get('content')?.errors?.['required']">Content is required.</div>
          <div class="invalid-feedback" *ngIf="postForm.get('content')?.errors?.['maxlength']">Content cannot exceed 2500 characters.</div>
        </div>

        <button type="submit" class="btn btn-success px-4" [disabled]="postForm.invalid">Submit Post</button>
      </form>
    </div>
  </div>
</div>
