<div class="container mt-4">
  <h2>Write a New Post</h2>
  <form [formGroup]="postForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label for="title" class="form-label">Title</label>
      <input type="text" id="title" class="form-control" formControlName="title" [ngClass]="{'is-invalid': postForm.get('title')?.invalid && postForm.get('title')?.touched}">
      <div class="invalid-feedback">Title is required.</div>
    </div>
    <div class="mb-3">
      <label for="author" class="form-label">Author</label>
      <input type="text" id="author" class="form-control" formControlName="author" [ngClass]="{'is-invalid': postForm.get('author')?.invalid && postForm.get('author')?.touched}">
      <div class="invalid-feedback">Author is required.</div>
    </div>
    <div class="mb-3">
      <label for="categoryId" class="form-label">Category (Optional)</label>
      <select id="categoryId" class="form-select" formControlName="categoryId">
        <option value="">Select a category</option>
        <option *ngFor="let cat of categories" [value]="cat.id">{{cat.name}}</option>
      </select>
    </div>
    <div class="mb-3">
      <label for="content" class="form-label">Content</label>
      <textarea id="content" class="form-control" rows="5" formControlName="content" [ngClass]="{'is-invalid': postForm.get('content')?.invalid && postForm.get('content')?.touched}"></textarea>
      <div class="invalid-feedback">Content is required.</div>
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="postForm.invalid">Submit</button>
  </form>
</div>
