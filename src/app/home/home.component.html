<div class="container mt-4">
  <div class="row">
    <div class="col-md-8 mx-auto">
      <h2 class="mb-4">Latest Posts</h2>

      <div *ngIf="isLoading" class="text-center my-4">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <ng-container *ngIf="!isLoading">
        <div *ngFor="let post of posts" class="card mb-4 shadow-sm border-0">
          <div class="card-body">
            <h3 class="card-title text-primary h5">{{ post.title || 'Untitled Post' }}</h3>
            <h6 class="card-subtitle mb-2 text-muted small" *ngIf="post.createdAt">
              {{ post.createdAt | date: 'mediumDate' }}
            </h6>
            <p class="card-text text-secondary" style="white-space: pre-wrap;">{{ post.content || 'No content available.' }}</p>
          </div>
        </div>
        <div *ngIf="posts.length === 0" class="alert alert-info text-center">
          <p class="mb-0">No posts found yet.</p>
        </div>
      </ng-container>
    </div>
  </div>
</div>
